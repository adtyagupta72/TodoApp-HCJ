<!DOCTYPE html>
<html>
    <head>
        <meta charset='utf-8'>
        <meta http-equiv='X-UA-Compatible' content='IE=edge'>
        <title>Todo App</title>
        <meta name='viewport' content='width=device-width, initial-scale=1'>
        <style>
            dialog {
                padding: 20px;
                border: 1px solid #ccc;
                border-radius: 5px;
                box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            }

            /* Style the backdrop overlay */
            dialog::backdrop {
                background-color: rgba(0, 0, 0, 0.4);
            }
        </style>
        <script>
            // JavaScript code execution place

            let todoList = []
            var count = 0

            console.log("Hello Todo App!")

            function openAddTodoDialog()
            {
                let dialog = document.getElementById("addTodoID")
                dialog.showModal()
            }

            function closeAddTodoDialog()
            {
                let dialog = document.getElementById("addTodoID")
                dialog.close()
            }

            function openEditTodoDialog()
            {
                let dialog = document.getElementById("editTodoID")
                dialog.showModal()
            }

            function closeEditTodoDialog()
            {
                let dialog = document.getElementById("editTodoID")
                dialog.close()
            }

            function onAddTodo()
            {
                console.log("Add a todo clicked!")
                
                let inputText = document.getElementById("addTodoInput").value
                let addTodoDescription = document.getElementById("addTodoDescription").value
                let addTodoDueDate = document.getElementById("addTodoDueDate").value
                let addTodoPriority = document.getElementById("addTodoPriority").value
                let addTodoCompleteID = document.getElementById("addTodoCompleteID").value
                let addTodoStatusID = document.getElementById("addTodoStatusID").value
                if(!inputText || !addTodoDescription || !addTodoDueDate || !addTodoCompleteID)
                {
                    alert("Any Field cannot be blank at all!")
                }
                else
                {
                    console.log("Input Text: ", inputText)
                    todoList.push({
                        todoTitle: inputText,
                        todoDescription:addTodoDescription,
                        todoDueDate: addTodoDueDate,
                        todoPriority:addTodoPriority,
                        todoID: ++count,
                        todoCompletionStatus: addTodoCompleteID,
                        todoStatus: addTodoStatusID,
                        todoCreationDate: Date.now(),
                        todoUpdationDate: Date.now()
                    })
                    console.log("Todo List: ", todoList)
                    document.getElementById("addTodoInput").value = ""
                    listAllTodos()
                    closeAddTodoDialog()
                }
            }

            function listAllTodos()
            {
                console.log("listAllTodos called!")
                let list = document.getElementById("todoListHTML")
                list.innerHTML = ""
                for(let count = 0; count<todoList.length; count++)
                {
                    list.innerHTML = list.innerHTML + "<li onclick='openEditTodoDialog()'> <div style='display: flex;'><input type='checkbox'> <div style='margin-left: 10px;'> "+todoList[count].todoTitle+"<br> "+todoList[count].todoDescription+" </div> </div> </li>"
                    // list.innerHTML = list.innerHTML + "<li>  <input type='checkbox'> "+todoList[count].todoTitle+"</li>"
                }
            }

            function addTestTodo()
            {
                let tempCount = 0
                todoList.push({
                    todoTitle: "Todo for test "+(++tempCount),
                    todoDescription:"Description comes here",
                    todoDueDate: "03/04/2026",
                    todoPriority:"High",
                    todoID: ++count,
                    todoCompletionStatus: false,
                    todoStatus: "Todo",
                    todoCreationDate: Date.now(),
                    todoUpdationDate: Date.now()
                })
                console.log("Todo List: ", todoList)
                listAllTodos()
            }

        </script>
    </head>
    <body>
        <h1>Todo App</h1><br>
        <!-- <input id="addTodoInput" placeholder="Enter todo Title here..."/> -->
        <br>
        <button onclick="openAddTodoDialog()">Add Todo</button>
        <br>
        <button onclick="addTestTodo()">Add Dummy Todos</button>
        <br>
        <ul id="todoListHTML" style="list-style-type: none;">
            <label id="noTodoLabel" style="display: none;">No ToDos added yet</label>
            <!-- <li> 
                <div style="display: flex;">
                    <input type="checkbox"> 
                    <div style="margin-left: 10px;">
                        Abc<br>
                        Description comes here
                    </div>
                </div>
            </li> -->
            <!-- <li>Def</li> -->
        </ul>
        <!--Creation date
            Updation date -->
        <dialog id="addTodoID" style="width: 50%;">
            <h2 style="text-align: center;">Add Todo</h2>
            <br>
            <form id="addTodoFormID" style="text-align: center;">
                <label>Todo Title</label>
                <input type="text" placeholder="Enter Todo Title..." id="addTodoInput" required><br><br>

                <label>Todo Description</label>
                <input type="text" placeholder="Enter Todo Description..." id="addTodoDescription" required><br><br>

                <label>Todo Due Date</label>
                <input type="date" placeholder="dd/mm/yyyy" id="addTodoDueDate" required><br><br>

                <label>Todo Priority</label>
                <select required id="addTodoPriority">
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select><br><br>

                <input type="checkbox" id="addTodoCompleteID"> 
                <label>Completed</label><br><br>

                <label>Todo Status</label>
                <select required id="addTodoStatusID">
                    <option>To do</option>
                    <option>In Progress</option>
                    <option>In Review</option>
                    <option>Done</option>
                </select><br><br>

                <input type="submit" value="Add Todo"/>
            </form>
        </dialog>

        <dialog id="editTodoID" style="width: 50%;">
            <h2 style="text-align: center;">Edit Todo</h2>
            <br>
            <form id="editTodoFormID" style="text-align: center;">
                <label>Todo Title</label>
                <input type="text" placeholder="Enter Todo Title..." id="editTodoInput" required><br><br>

                <label>Todo Description</label>
                <input type="text" placeholder="Enter Todo Description..." id="editTodoDescription" required><br><br>

                <label>Todo Due Date</label>
                <input type="date" placeholder="dd/mm/yyyy" id="editTodoDueDate" required><br><br>

                <label>Todo Priority</label>
                <select required id="editTodoPriority">
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select><br><br>

                <input type="checkbox" id="editTodoCompleteID"> 
                <label>Completed</label><br><br>

                <label>Todo Status</label>
                <select required id="editTodoStatusID">
                    <option>To do</option>
                    <option>In Progress</option>
                    <option>In Review</option>
                    <option>Done</option>
                </select><br><br>

                <input type="submit" value="Update Todo"/>
            </form>
        </dialog>

        <script>
            let noTodoLabel = document.getElementById("noTodoLabel")
            if(todoList.length == 0)
            {
                noTodoLabel.style = ""
            }

            let addTodoFormID = document.getElementById("addTodoFormID")

            addTodoFormID.addEventListener("submit", function (event)
            {
                event.preventDefault()
                console.log("The form is submitted now!!")
                onAddTodo()
            });

        </script>
    </body>
</html>

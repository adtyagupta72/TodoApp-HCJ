<!DOCTYPE html>
<html>
    <head>
        <meta charset='utf-8'>
        <meta http-equiv='X-UA-Compatible' content='IE=edge'>
        <title>Todo App</title>
        <meta name='viewport' content='width=device-width, initial-scale=1'>
        <script>
            // JavaScript code execution place

            let todoList = []
            var count = 0

            console.log("Hello Todo App!")
            function onAddTodo()
            {
                console.log("Add a todo clicked!")
                let inputText = document.getElementById("addTodoInput").value
                if(!inputText)
                {
                    alert("Todo cannot be blank at all!")
                }
                else
                {
                    console.log("Input Text: ", inputText)
                    todoList.push({
                        todoTitle: inputText,
                        todoDescription:"",
                        todoDueDate: "",
                        todoPriority:"",
                        todoID: ++count,
                        todoCompletionStatus: false,
                        todoStatus: "Todo",
                        todoCreationDate: "",
                        todoUpdationDate: ""
                    })
                    console.log("Todo List: ", todoList)
                    document.getElementById("addTodoInput").value = ""
                }
            }
        </script>
    </head>
    <body>
        <h1>Todo App</h1><br>
        <input id="addTodoInput" placeholder="Enter todo Title here..."/>
        <br>
        <button onclick="onAddTodo()">Add Todo</button>
        <br>
        <ul>
            <li>Abc</li>
            <li>Def</li>
        </ul>
    </body>
</html>

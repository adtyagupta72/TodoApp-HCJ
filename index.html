<!DOCTYPE html>
<html>
    <head>
        <meta charset='utf-8'>
        <meta http-equiv='X-UA-Compatible' content='IE=edge'>
        <title>Todo App</title>
        <meta name='viewport' content='width=device-width, initial-scale=1'>
        <link rel="stylesheet" href="index.css">
        <script src="index.js"></script>
    </head>
    <body>
        <h1>Todo App</h1><br>
        <!-- <input id="addTodoInput" placeholder="Enter todo Title here..."/> -->
        <br>
        <button popovertarget="addTodoID" >Add Todo</button>
        <!-- onclick="openAddTodoDialog()" -->
        <br>
        <button onclick="addTestTodo()">Add Dummy Todos</button>
        <br>
        <ul id="todoListHTML" style="list-style-type: none;">
            <label id="noTodoLabel" style="display: none;">No ToDos added yet</label>
            <!-- <li> 
                <div style="display: flex;">
                    <input type="checkbox"> 
                    <div style="margin-left: 10px;">
                        Abc<br>
                        Description comes here
                    </div>
                </div>
            </li> -->
            <!-- <li>Def</li> -->
        </ul>
        <dialog id="addTodoID" class="dialogCloseClass" style="width: 50%;" popover="auto">
            <h2 style="text-align: center;">Add Todo</h2>
            <br>
            <form id="addTodoFormID" style="text-align: center;">
                <label>Todo Title</label>
                <input type="text" placeholder="Enter Todo Title..." id="addTodoInput" required><br><br>

                <label>Todo Description</label>
                <input type="text" placeholder="Enter Todo Description..." id="addTodoDescription" required><br><br>

                <label>Todo Due Date</label>
                <input type="date" placeholder="dd/mm/yyyy" id="addTodoDueDate" required><br><br>

                <label>Todo Priority</label>
                <select required id="addTodoPriority">
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select><br><br>

                <input type="checkbox" id="addTodoCompleteID"> 
                <label>Completed</label><br><br>

                <label>Todo Status</label>
                <select required id="addTodoStatusID">
                    <option>To do</option>
                    <option>In Progress</option>
                    <option>In Review</option>
                    <option>Done</option>
                </select><br><br>

                <input type="submit" value="Add Todo"/>
            </form>
        </dialog>

        <dialog id="editTodoID" class="dialogCloseClass" style="width: 50%;" popover>
            <h2 style="text-align: center;">Edit Todo</h2>
            <br>
            <form id="editTodoFormID" style="text-align: center;">
                <label>Todo Title</label>
                <input type="text" placeholder="Enter Todo Title..." id="editTodoInput" required><br><br>

                <label>Todo Description</label>
                <input type="text" placeholder="Enter Todo Description..." id="editTodoDescription" required><br><br>

                <label>Todo Due Date</label>
                <input type="date" placeholder="dd/mm/yyyy" id="editTodoDueDate" required><br><br>

                <label>Todo Priority</label>
                <select required id="editTodoPriority">
                    <option>High</option>
                    <option>Medium</option>
                    <option>Low</option>
                </select><br><br>

                <input type="checkbox" id="editTodoCompleteID"> 
                <label>Completed</label><br><br>

                <label>Todo Status</label>
                <select required id="editTodoStatusID">
                    <option>To do</option>
                    <option>In Progress</option>
                    <option>In Review</option>
                    <option>Done</option>
                </select><br><br>

                <input type="submit" value="Update Todo"/>
            </form>
        </dialog>

        <br>------------<br>

        <dialog id="my-dialog" popover>
            <p>This dialog was opened using a popovertargetaction attribute.</p>
            <button popovertarget="my-dialog" popovertargetaction="hide">Close</button>
        </dialog>
        <br>------------<br>

        <script src="index-last.js"></script>
    </body>
</html>
